name: Initialize changelog files

on: workflow_dispatch

jobs:
  changelog:
    if: >-
      ${{ contains(github.ref, 'refs/heads/hotfix/v') ||
          contains(github.ref, 'refs/heads/release/v') }}
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Set version
        run: |
          REF="${{ github.ref }}"
          echo "VERSION=${REF#*/v}" >> $GITHUB_ENV

      - name: Create changelog
        run: |
          CHANGES_DIR=desktop-apps/win-linux/package/windows/update/changes/$VERSION
          mkdir -p $CHANGES_DIR

          cat > $CHANGES_DIR/changes.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>История изменений Р7-Офис Профессиональный</title>
              <style type="text/css">
                  body {
                      background: white;
                      font: 12px "Lucida Grande", "Lucida Sans Unicode", Verdana, Lucida, Helvetica, sans-serif;
                  }
                  h1, h2, h3 {
                      color: #000000;
                      font-family: "Helvetica";
                      font-weight: normal;
                      font-style: normal;
                  }
                  h1 {
                      font-size: 18px;
                  }
                  h2 {
                      font-size: 16px;
                  }
                  h3 {
                      font-size: 14px;
                  }
                  a {
                      text-decoration: none;
                  }
                  .releasedate {
                      color: #888;
                      font-size: medium;
                  }
                  .more {
                      margin-bottom: 20px;
                  }
              </style>
          </head>
          <body>
              <div class="version">
                  <h1>Р7-Офис Профессиональный ${VERSION}<span class="releasedate"> - [[DATE]]</span></h1>

                  <h2>Новые функции</h2>
                  <h4>Все редакторы</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Редактор документов</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Редактор таблиц</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Редактор презентаций</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>

                  <h2>Исправления</h2>
                  <h4>Все редакторы</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Редактор документов</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Редактор таблиц</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Редактор презентаций</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
              </div>
          </body>
          </html>
          EOF

          CHANGES_DIR=desktop-apps/macos/ONLYOFFICE/update/updates/r7-office/changes/$VERSION
          mkdir -p $CHANGES_DIR

          cat > $CHANGES_DIR/ReleaseNotes.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>История изменений Р7-Офис Профессиональный</title>
              <style type="text/css">
                  /* variables */
                  :root {
                      --color-black: #141923;
                      --color-white: #fff;
                      --color-gray-100: #f7fafc;
                      --color-gray-200: #edf2f7;
                      --color-gray-300: #e2e8f0;
                      --color-gray-400: #cbd5e0;
                      --color-gray-500: #a0aec0;
                      --color-gray-600: #718096;
                      --color-gray-700: #4a5568;
                      --color-gray-800: #2d3748;
                      --color-gray-900: #1a202c;
                  }
                  body {
                      background: var(--color-white);
                      color: var(--color-gray-800);
                      font: 12px "Lucida Grande", "Lucida Sans Unicode", Verdana, Lucida, Helvetica, sans-serif;
                  }
                  h1, h2, h3 {
                      color: var(--color-gray-800);
                      font-weight: normal;
                      font-style: normal;
                  }
                  h1 {
                      font-size: 1.7em;
                  }
                  h2 {
                      font-size: 1.4em;
                      font-weight: lighter;
                  }
                  h4 {
                      font-size: 1.2em;
                      font-weight: lighter;
                  }
                  code {
                      background: var(--color-gray-200);
                      font-family: monospace;
                      padding: 1px 5px;
                  }
                  ul {
                      padding: 0 0 0 20px;
                  }
                  li {
                      margin-left: 20px;
                      margin-bottom: 0.2em;
                      padding: 0;
                  }
                  hr {
                      margin: 20px 0;
                      border: var(--color-gray-400) solid 0.5px;
                  }
                  .releasedate {
                      color: var(--color-gray-600);
                      font-weight: lighter;
                  }

                  /* prefers light mode */
                  @media (prefers-color-scheme: dark) {
                      body {
                          background: var(--color-gray-900);
                          color: var(--color-gray-200);
                      }

                      h1, h2, h3 {
                          color: var(--color-white);
                      }

                      code {
                          background: var(--color-gray-800);
                          color: var(--color-gray-200);
                      }

                      .releasedate {
                          color: var(--color-gray-600);
                      }
                  }
              </style>
          </head>
          <body>
              <div class="version">
                  <h1>Р7-Офис Профессиональный ${VERSION}<span class="releasedate"> - [[DATE]]</span></h1>

                  <h2>Новые функции</h2>
                  <h4>Все редакторы</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Редактор документов</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Редактор таблиц</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Редактор презентаций</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>

                  <h2>Исправления</h2>
                  <h4>Все редакторы</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Редактор документов</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Редактор таблиц</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Редактор презентаций</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
              </div>
          </body>
          </html>
          EOF

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: Initialize changelogs for v${{ env.VERSION }}
