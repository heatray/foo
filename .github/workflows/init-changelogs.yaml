name: Create changelog files

on: workflow_dispatch

jobs:
  create-changelog:
    if: >-
      ${{ startsWith(github.event.ref, 'hotfix/') ||
      startsWith(github.event.ref, 'release/') }}
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Set version
        run: >-
          echo "${{ github.event.ref }}" |
          awk '{gsub(/.+\/v/,"VERSION=");print;}' >> $GITHUB_ENV

      - name: Create template changelogs
        run: |
          changes_dir=win-linux/package/windows/update/changes/$VERSION
          mkdir -p $changes_dir

          TITLE_EN="ONLYOFFICE Desktop Editors Release Notes"
          TITLE_RU="История изменений ONLYOFFICE Desktop Editors"
          MORE_EN="and a little more..."
          MORE_RU="и прочее..."

          cat >> $changes_dir/en.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>$TITLE_EN</title>
              <style type="text/css">
                  body {
                      background: white;
                      font: 12px "Lucida Grande", "Lucida Sans Unicode", Verdana, Lucida, Helvetica, sans-serif;
                  }
                  h1, h2, h3 {
                      color: #000000;
                      font-family: "Helvetica";
                      font-weight: normal;
                      font-style: normal;
                  }
                  h1 {
                      font-size: 18px;
                  }
                  h2 {
                      font-size: 16px;
                  }
                  h3 {
                      font-size: 14px;
                  }
                  .releasedate {
                      color: #888;
                      font-size: medium;
                  }
                  .more {
                      margin-bottom: 20px;
                  }
                  .version {
                      border-bottom: 1px solid #cfcfcf;
                  }
              </style>
          </head>
          <body>
              <div class="version">
                  <h1>ONLYOFFICE Desktop Editors $VERSION<span class="releasedate"> - [[DATE]]</span></h1>
                  <h2>New Features</h2>
                  <h4>All Editors</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Document Editor</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Spreadsheet Editor</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Presentation Editor</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h2>Fixes</h2>
                  <h4>All Editors</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Document Editor</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Spreadsheet Editor</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <h4>Presentation Editor</h4>
                  <ul>
                      <li>TODO</li>
                  </ul>
                  <div class="more"><a href="https://github.com/ONLYOFFICE/DesktopEditors/blob/master/CHANGELOG.md#$VERSION" target="_blank">$MORE_EN</a></div>
              </div>
          </body>
          </html>
          EOF

      - name: Commit changes
        uses: EndBug/add-and-commit@v8
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: Create template changelogs for v${{ env.version }}
