name: Build online installer

on: workflow_dispatch

jobs:
  build:
    name: Build online installer
    runs-on: windows-2019
    steps:

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 5.15.2
        target: desktop
        arch: win32_msvc2019
        # arch: 'win64_msvc2019_64'
        use-official: true
        email: ${{ secrets.QT_EMAIL }}
        pw: ${{ secrets.QT_PW }}
        cache: true
        cache-key-prefix: install-qt-action

    - name: Build
