name: Build online installer

on: workflow_dispatch

jobs:
  build:
    name: Build online installer
    runs-on: windows-2019
    steps:

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 5.15.2
        target: desktop
        arch: win32_msvc2019
        # arch: 'win64_msvc2019_64'
        use-official: true
        email: ${{ secrets.QT_EMAIL }}
        pw: ${{ secrets.QT_PW }}
        cache: true
        cache-key-prefix: install-qt-action

    - name: Build
      run: |
        $ErrorActionPreference = "Stop"

        git clone https://github.com/ONLYOFFICE/build_tools.git
        git clone https://github.com/ONLYOFFICE/desktop-onlineinstaller.git

        $env:QT_PATH = "$env:QT_ROOT_DIR\.." | Resolve-Path
        "QT_PATH = $env:QT_PATH"
        "QT_ROOT_DIR = $env:QT_ROOT_DIR"

        sl desktop-onlineinstaller

        (Get-Content -Path sln.json) -replace "win_xp", "win" | Set-Content -Path sln.json

        echo "module=onlineinstaller
        branch=master
        platform=win_32
        config=release
        clean=0
        update=0
        update-light=0
        git-protocol=https
        vs-version=2019
        qt-dir=`"$env:QT_PATH`"
        qt-dir-xp=`"$env:QT_PATH`"" >> config
        gc config
        python make.py
        if ($LastExitCode -ne 0) { throw }
