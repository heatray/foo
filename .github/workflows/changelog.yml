name: Changelog for new release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'     
        required: true
jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Write template changelog
        run: |
          cat \
            <(head -n4 CHANGELOG.md) \
            <(echo 'Line 5!') \
            <(tail -n +5 CHANGELOG.md) \
            > CHANGELOG.md
      - name: Commit changes
        uses: EndBug/add-and-commit@v8
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: Add template changelog for v${{ github.event.inputs.version }}
          add: CHANGELOG.md
          new_branch: feature/changelog-for-v${{ github.event.inputs.version }}
