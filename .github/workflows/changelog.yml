name: Changelog for new release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'     
        required: true
jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Echo version
        run: |
          echo "Version: ${{ github.event.inputs.version }}"

      - name: Create template changelogs
        run: |
          echo "${{ github.event.inputs.version }}" > version

      - name: Commit changes
        uses: EndBug/add-and-commit@v8
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: Create template changelogs for v${{ github.event.inputs.version }}
          add: version
          new_branch: feature/changelog-for-v${{ github.event.inputs.version }}
