name: Docker testing

on:
  workflow_dispatch:
    inputs:
      build:
        description: 'Build number (ex. 45)'
        type: string
        required: true
      amd64:
        type: boolean
        description: 'Build AMD64'
        default: true
      arm64:
        type: boolean
        description: 'Build ARM64'
        default: true
      community:
        type: boolean
        description: 'Build Community Edition'
        default: true
      enterprise:
        type: boolean
        description: 'Build Enterprise Edition'
        default: true
      developer:
        type: boolean
        description: 'Build Developer Edition'
        default: true

env: 
  COMPANY_NAME: "onlyoffice"
  PRODUCT_NAME: "documentserver"
      
jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - id: matrix
        run: |
          set -ex

          branch_name=${GITHUB_REF#refs/heads/}
          if [ $branch_name = develop ]; then
            echo "RELEASE_BRANCH=unstable" >> $GITHUB_ENV
            echo "PRODUCT_VERSION=99.99.99" >> $GITHUB_ENV
          elif [[ $branch_name =~ hotfix || $branch_name =~ release ]]; then
            echo "RELEASE_BRANCH=testing" >> $GITHUB_ENV
            echo "PRODUCT_VERSION=${branch_name#*/v}" >> $GITHUB_ENV
          else
            echo "Wrong branch."
            exit 1
          fi

          echo "BUILD_NUMBER=${{ github.event.inputs.build }}" >> $GITHUB_ENV

          [ ${{ github.event.inputs.amd64 }} = true ] && platforms+=("amd64")
          [ ${{ github.event.inputs.arm64 }} = true ] && platforms+=("arm64")
          if [ -z ${platforms} ]; then
            echo "None of the platforms are selected."
            exit 1
          fi
          echo "PLATFORM=$(echo ${platforms[*]/#/linux/} | tr ' ' ',')" >> $GITHUB_ENV

          [ ${{ github.event.inputs.community }} = true ] && editions+=("community")
          [ ${{ github.event.inputs.enterprise }} = true ] && editions+=("enterprise")
          [ ${{ github.event.inputs.developer }} = true ] && editions+=("developer")
          if [ -z ${editions} ]; then
            echo "None of the editions are selected."
            exit 1
          fi
          echo "::set-output name=editions::$(jq -n -c --arg arr "${editions[*]}" '($arr|split(" "))')"
    outputs:
      editions: ${{ steps.matrix.outputs.editions }}

  build:
    name: "Build ${{ matrix.image }}-${{ matrix.edition }}"
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        image: ["documentserver"]
        edition: ${{ fromJSON(needs.prepare.outputs.editions) }}
    steps:
      - name: Checkout code 
        uses: actions/checkout@v3

      # - name: Set up QEMU
      #   uses: docker/setup-qemu-action@v2

      # - name: Set up Docker Buildx
      #   id: buildx
      #   uses: docker/setup-buildx-action@v2
     
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v2
      #   with:
      #     username: ${{ secrets.DOCKER_HUB_USERNAME }}
      #     password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build 4testing
        run: |
          set -eux

          ### ==>> At this step build variable declaration ###
          [ ${{ matrix.edition }} = community ] && PRODUCT_EDITION=""
          [ ${{ matrix.edition }} = enterprise ] && PRODUCT_EDITION="-ee"
          [ ${{ matrix.edition }} = developer ] && PRODUCT_EDITION="-de"
          # export COMPANY_NAME
          # export PRODUCT_NAME
          export PRODUCT_EDITION
          export PACKAGE_VERSION=${PRODUCT_VERSION}-${BUILD_NUMBER}
          export PACKAGE_BASEURL=http://repo-doc-onlyoffice-com.s3.amazonaws.com/${COMPANY_NAME}/${RELEASE_BRANCH}/ubuntu
          # export PLATFORM
          export DOCKERFILE=Dockerfile
          export PREFIX_NAME=4testing-
          export TAG=${PRODUCT_VERSION}.${BUILD_NUMBER}

          ### ==>> Build and push images at this step ###
          echo \
          docker buildx bake -f docker-bake.hcl ${{ matrix.image }} --push
          echo "DONE: Build success"
        shell: bash
