name: Markdown Lint

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - 'CHANGELOG.md'

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          # config: '.markdownlint.jsonc'
          globs: |
            CHANGELOG.md
